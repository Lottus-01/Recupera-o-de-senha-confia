<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Recuperação de Conta</title>
  <link rel="stylesheet" href="email.css">
</head>
<body>
  <div class="container">
    <div class="logo">Google</div>
    <h2>Recuperar sua conta</h2>
    <p>Insira seu e-mail para recuperar sua conta.</p>

    <form action="senha.html" method="get">
      <label class="label">Email:
        <input id="email" name="email" type="email" required>
      </label>
      <button class="btn" type="submit">Próxima</button>
    </form>
  </div>
</body>
</html>
